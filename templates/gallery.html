{% extends "layout.html" %}
{% block content %}
<section class="page-hero">
  <div data-aos>
    <p class="section-eyebrow">See For Yourself</p>
    <h1>Our Gallery</h1>
  </div>
  <p data-aos data-aos-delay="100">Gym spaces, equipment, and trainers in action.</p>
</section>

<section class="coverflow coverflow-gallery" data-aos id="coverflowGallery">
  <div class="coverflow-track" id="coverflowTrackGallery">
    {% for g in gallery %}
    <div class="coverflow-item" data-index="{{ loop.index0 }}">
      <img src="{{ g.src }}" alt="{{ g.alt }}" loading="lazy">
    </div>
    {% endfor %}
  </div>
  <button class="coverflow-prev" aria-label="Previous"><i class="fas fa-chevron-left"></i></button>
  <button class="coverflow-next" aria-label="Next"><i class="fas fa-chevron-right"></i></button>
  <div class="coverflow-dots"></div>
</section>
{% endblock %}
